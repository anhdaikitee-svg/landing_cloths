name: Daily Supabase Backup

on:
  schedule:
    # Chạy vào 00:00 mỗi ngày (giờ UTC, tức 7h sáng giờ Việt Nam)
    - cron: '0 0 * * *'
  workflow_dispatch: 

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Lấy thời gian hiện tại
        id: date
        run: echo "date=$(date +'%Y-%m-%d_%H-%M')" >> $GITHUB_OUTPUT

      - name: Cài đặt PostgreSQL Client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Backup Database bằng pg_dump
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "LỖI: Chưa cấu hình SUPABASE_DB_URL trong Github Secrets!"
            exit 1
          fi
          
          # Xuất toàn bộ cấu trúc và dữ liệu ra file backup.dump
          pg_dump "$DATABASE_URL" --clean --if-exists --format=c --file=backup-${{ steps.date.outputs.date }}.dump

      - name: Lưu trữ Backup File vào Github Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup-${{ steps.date.outputs.date }}
          path: backup-${{ steps.date.outputs.date }}.dump
          retention-days: 90
