name: Daily Supabase Backup

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: 

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Lấy thời gian hiện tại
        id: date
        run: echo "date=$(date +'%Y-%m-%d_%H-%M')" >> $GITHUB_OUTPUT

      - name: Cài đặt PostgreSQL Client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Backup Database bằng pg_dump
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          if [ -z "$PGPASSWORD" ]; then
            echo "LỖI: Chưa cấu hình SUPABASE_DB_PASSWORD trong Github Secrets!"
            exit 1
          fi
          
          # Sử dụng tham số tường minh để tránh lỗi parse URL của pg_dump
          pg_dump -h aws-1-ap-southeast-1.pooler.supabase.com -p 5432 -U postgres.biaiohzfozhumggxikez -d postgres --clean --if-exists --format=c --file=backup-${{ steps.date.outputs.date }}.dump

      - name: Lưu trữ Backup File vào Github Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup-${{ steps.date.outputs.date }}
          path: backup-${{ steps.date.outputs.date }}.dump
          retention-days: 90
